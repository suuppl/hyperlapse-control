# Raspberry Pi Pico W — full pinout with project pin assignments
# Physical pin 1 = top-left (USB up); left column runs 1-20 top-to-bottom,
# right column runs 40-21 top-to-bottom.
board: Raspberry Pi Pico W

pins:
  - physical: 1
    gp: GP0
    alt: [SPI0 RX, I2C0 SDA, UART0 TX, PWM0 A]
  - physical: 2
    gp: GP1
    alt: [SPI0 CSn, I2C0 SCL, UART0 RX, PWM0 B]
  - physical: 3
    type: gnd
  - physical: 4
    gp: GP2
    alt: [SPI0 SCK, I2C1 SDA, UART0 CTS, PWM1 A]
  - physical: 5
    gp: GP3
    alt: [SPI0 TX, I2C1 SCL, UART0 RTS, PWM1 B]
  - physical: 6
    gp: GP4
    alt: [SPI0 RX, I2C0 SDA, UART1 TX, PWM2 A]
  - physical: 7
    gp: GP5
    alt: [SPI0 CSn, I2C0 SCL, UART1 RX, PWM2 B]
  - physical: 8
    type: gnd
  - physical: 9
    gp: GP6
    alt: [SPI0 SCK, I2C1 SDA, UART1 CTS, PWM3 A]
  - physical: 10
    gp: GP7
    alt: [SPI0 TX, I2C1 SCL, UART1 RTS, PWM3 B]
  - physical: 11
    gp: GP8
    alt: [SPI1 RX, I2C0 SDA, UART1 TX, PWM4 A]
  - physical: 12
    gp: GP9
    alt: [SPI1 CSn, I2C0 SCL, UART1 RX, PWM4 B]
  - physical: 13
    type: gnd
  - physical: 14
    gp: GP10
    alt: [SPI1 SCK, I2C1 SDA, UART1 CTS, PWM5 A]
  - physical: 15
    gp: GP11
    alt: [SPI1 TX, I2C1 SCL, UART1 RTS, PWM5 B]
  - physical: 16
    gp: GP12
    alt: [SPI1 RX, I2C0 SDA, UART0 TX, PWM6 A]
  - physical: 17
    gp: GP13
    alt: [SPI1 CSn, I2C0 SCL, UART0 RX, PWM6 B]
  - physical: 18
    type: gnd
  - physical: 19
    gp: GP14
    alt: [SPI1 SCK, I2C1 SDA, UART0 CTS, PWM7 A]
  - physical: 20
    gp: GP15
    alt: [SPI1 TX, I2C1 SCL, UART0 RTS, PWM7 B]
  - physical: 21
    gp: GP16
    alt: [SPI0 RX, I2C0 SDA, UART0 TX, PWM0 A]
  - physical: 22
    gp: GP17
    alt: [SPI0 CSn, I2C0 SCL, UART0 RX, PWM0 B]
  - physical: 23
    type: gnd
  - physical: 24
    gp: GP18
    alt: [SPI0 SCK, I2C1 SDA, UART0 CTS, PWM1 A]
  - physical: 25
    gp: GP19
    alt: [SPI0 TX, I2C1 SCL, UART0 RTS, PWM1 B]
  - physical: 26
    gp: GP20
    alt: [SPI0 RX, I2C0 SDA, UART1 TX, PWM2 A]
  - physical: 27
    gp: GP21
    alt: [SPI0 CSn, I2C0 SCL, UART1 RX, PWM2 B]
  - physical: 28
    type: gnd
  - physical: 29
    gp: GP22
    alt: [SPI0 SCK, I2C1 SDA, UART1 CTS, PWM3 A]
  - physical: 30
    type: system
    name: RUN
    note: pull LOW to reset
  - physical: 31
    gp: GP26
    adc: A0
    alt: [SPI1 SCK, I2C1 SDA, UART1 CTS, PWM5 A]
  - physical: 32
    gp: GP27
    adc: A1
    alt: [SPI1 TX, I2C1 SCL, UART1 RTS, PWM5 B]
  - physical: 33
    type: adc_gnd
    name: ADC GND
  - physical: 34
    gp: GP28
    adc: A2
    alt: [SPI1 RX, I2C0 SDA, UART0 TX, PWM6 A]
  - physical: 35
    type: adc_ref
    name: ADC VREF
  - physical: 36
    type: power
    name: 3V3 Out
    note: 3.3 V regulated output, max ~300 mA
  - physical: 37
    type: system
    name: 3V3 En
    note: pull LOW to disable 3.3 V regulator
  - physical: 38
    type: gnd
  - physical: 39
    type: power
    name: VSYS
    note: 1.8-5.5 V input or 5 V out (USB, via diode)
  - physical: 40
    type: power
    name: VBUS
    note: 5 V USB input

# Internal GP pins (not on header):
internal:
  - gp: GP23
    function: wireless power on
  - gp: GP24
    function: wireless SPI data
  - gp: GP25
    function: wireless SPI chip-select
  - gp: GP29
    adc: A3
    function: wireless SPI clock / VSYS sense (VSYS/3 via divider)
